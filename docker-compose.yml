# Docker Compose: FastAPI backend (8000) and Next.js frontend (3000) on network helical-net; Neon Postgres via .env.
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ENV: dev
      LOG_LEVEL: INFO
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
      # Prisma needs plain postgresql:// — override the asyncpg dialect from .env
      DATABASE_URL: ${PRISMA_DATABASE_URL:-${DIRECT_URL}}
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: helical-net
