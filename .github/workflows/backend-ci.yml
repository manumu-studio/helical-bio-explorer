# Backend CI: ruff + mypy + alembic offline SQL + pytest.
# Runs only when backend files (or this workflow) change.

name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    # Settings validators require well-formed URLs; the values never hit a real DB
    # because tests override the engine with aiosqlite. These are parse-only.
    env:
      DATABASE_URL: "postgresql+asyncpg://user:pass@localhost:5432/test"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/test"
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync deps (frozen, with dev extras)
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict) — app
        run: uv run mypy --strict app/

      - name: Mypy (strict) — tests
        run: uv run mypy --strict tests/

      - name: Alembic offline SQL
        run: |
          uv run alembic upgrade head --sql > /tmp/migration.sql
          wc -l /tmp/migration.sql

      - name: Pytest
        run: uv run pytest -v
