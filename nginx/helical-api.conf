# Nginx reverse proxy for the helical-bio-explorer FastAPI backend.
# Install: sudo cp nginx/helical-api.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/helical-api.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS is wired by certbot (run once per host after DNS is live):
#          sudo certbot --nginx -d api.helical.manumustudio.com

server {
    listen 80;
    server_name api.helical.manumustudio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.helical.manumustudio.com;

    ssl_certificate /etc/letsencrypt/live/api.helical.manumustudio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.helical.manumustudio.com/privkey.pem;

    # 10 MB covers JSON payloads from the parquet API comfortably.
    client_max_body_size 10m;
    # Summary endpoint reads two parquet files; 120s leaves headroom for cold reads.
    proxy_read_timeout 120s;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 + Upgrade headers keep the door open for future SSE / websocket work.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
